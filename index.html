<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>BAYS - FF Simple Check & Valuation</title>
    <style>
        /* ===== RESET ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            background: #0a0e1a;
            color: #e0f0ff;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            background: radial-gradient(ellipse at 30% 40%, #0b1a33, #030712);
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 600px;
            width: 100%;
            background: rgba(8, 20, 48, 0.75);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-radius: 30px;
            padding: 30px;
            border: 1px solid rgba(0, 180, 255, 0.25);
            box-shadow: 0 20px 60px rgba(0, 80, 255, 0.25);
        }

        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 25px;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #38bdf8, #1d4ed8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo span {
            background: none;
            -webkit-text-fill-color: #60a5fa;
            font-weight: 300;
        }

        .search-form {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
        }

        .search-form input {
            flex: 1;
            padding: 14px 18px;
            border-radius: 14px;
            border: 1px solid rgba(56, 189, 248, 0.25);
            background: rgba(15, 30, 60, 0.6);
            color: #e0f0ff;
            font-size: 16px;
            outline: none;
        }

        .search-form input:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.15);
        }

        .search-form button {
            padding: 14px 28px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: #fff;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(37, 99, 235, 0.3);
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px 0;
        }

        .loading.active { display: block; }

        .spinner {
            width: 36px;
            height: 36px;
            border: 4px solid rgba(56, 189, 248, 0.15);
            border-top: 4px solid #38bdf8;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .error-message {
            display: none;
            background: rgba(239, 68, 68, 0.12);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #f87171;
            padding: 14px;
            border-radius: 14px;
            margin-bottom: 20px;
        }

        .error-message.active { display: block; }

        .player-stats {
            display: none;
        }

        .player-stats.active { display: block; }

        /* ===== PRICE ESTIMATION CARD ===== */
        .price-card {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.2), rgba(4, 120, 87, 0.3));
            border: 1px solid rgba(16, 185, 129, 0.4);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(4, 120, 87, 0.2);
        }

        .price-card .price-title {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #a7f3d0;
            margin-bottom: 4px;
        }

        .price-card .price-value {
            font-size: 28px;
            font-weight: 800;
            color: #10b981;
            text-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
        }

        /* ===== PROFILE BLOCK ===== */
        .profile-header {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            background: rgba(15, 30, 60, 0.5);
            border-radius: 18px;
            border: 1px solid rgba(56, 189, 248, 0.12);
            margin-bottom: 20px;
        }

        .avatar-circle {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1d4ed8, #38bdf8);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 700;
            color: #fff;
        }

        .profile-info .name {
            font-size: 22px;
            font-weight: 700;
            color: #f0faff;
        }

        .profile-info .uid-tag {
            font-size: 13px;
            color: #64748b;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .stat-box {
            background: rgba(15, 30, 60, 0.4);
            border: 1px solid rgba(56, 189, 248, 0.08);
            border-radius: 14px;
            padding: 14px;
            text-align: center;
        }

        .stat-box .stat-value {
            font-size: 18px;
            font-weight: 700;
            color: #f0faff;
        }

        .stat-box .stat-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #64748b;
            margin-top: 4px;
        }

        @media (max-width: 480px) {
            .search-form { flex-direction: column; }
            .stats-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <canvas id="particles-canvas"></canvas>

    <div class="container">
        <div class="header">
            <div class="logo">@BAYS<span>·CHECKER</span></div>
        </div>

        <form class="search-form" id="searchForm">
            <input type="text" id="playerUid" placeholder="Masukkan UID Akun Free Fire" value="7378196943" required />
            <button type="submit" id="searchBtn">🔍 Periksa</button>
        </form>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>⏳ Menghubungkan ke database server...</p>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <div class="player-stats" id="playerStats">
            
            <!-- ESTIMASI HARGA -->
            <div class="price-card">
                <div class="price-title">Estimasi Harga Akun</div>
                <div class="price-value" id="estimatedPrice">Rp 0</div>
            </div>

            <!-- DETAIL AKUN -->
            <div class="profile-header">
                <div class="avatar-circle" id="playerAvatar">?</div>
                <div class="profile-info">
                    <div class="name" id="playerName">—</div>
                    <div class="uid-tag" id="displayUid">UID: —</div>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-value" id="resPrime">1</div>
                    <div class="stat-label">✨ Level Prime</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="resLevel">0</div>
                    <div class="stat-label">🏅 Level Player</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="resExp">0</div>
                    <div class="stat-label">📈 EXP Level</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="resLikes">0</div>
                    <div class="stat-label">❤️ Jumlah Like</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="resBooyah">OFF</div>
                    <div class="stat-label">🏆 Booyah Pas</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="resRegion">ID</div>
                    <div class="stat-label">🌍 Server Region</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="resCredit">0</div>
                    <div class="stat-label">💳 Credit Score</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="resLastLogin" style="font-size: 13px;">—</div>
                    <div class="stat-label">🕒 Last Login</div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const API_KEY = 'ZXwXaUMC6p8IKHEPdt5SCe8YVFPz0n';
        const USER_UID = 'zmD9KLSfNuO5Lrjij0aNQmdlRy42';
        const API_BASE = 'https://proapis.hlgamingofficial.com/main/games/freefire/account/api';

        const searchForm = document.getElementById('searchForm');
        const loading = document.getElementById('loading');
        const errorMessage = document.getElementById('errorMessage');
        const playerStats = document.getElementById('playerStats');
        const searchBtn = document.getElementById('searchBtn');

        // Fungsi Auto-detect Region Berdasarkan Digit Awal UID Free Fire
        function detectRegionByUid(uid) {
            if (!uid) return 'id';
            const firstDigit = uid.charAt(0);
            
            // Aturan pemetaan regional internal database Free Fire
            const regionMap = {
                '7': 'id',  // Indonesia
                '8': 'id',  // Indonesia
                '1': 'sg',  // Singapore / MYSG
                '2': 'vn',  // Vietnam
                '3': 'th',  // Thailand
                '4': 'br',  // Brazil
                '5': 'us',  // USA / NA
                '6': 'eu',  // Eropa
                '9': 'ind'  // India / Bangladesh
            };
            
            return regionMap[firstDigit] || 'id'; // default fallback ke id (Indonesia)
        }

        searchForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const uid = document.getElementById('playerUid').value.trim();
            
            // Auto detect region server
            const detectedRegion = detectRegionByUid(uid);

            if (!uid) {
                showError('Harap masukkan UID valid.');
                return;
            }

            hideError();
            hideStats();
            showLoading();
            searchBtn.disabled = true;

            try {
                const url = `${API_BASE}?sectionName=AllData&PlayerUid=${uid}&region=${detectedRegion}&useruid=${USER_UID}&api=${API_KEY}`;
                const response = await fetch(url);

                if (!response.ok) throw new Error(`HTTP status ${response.status}`);
                
                const data = await response.json();

                if (!data.result || !data.result.AccountInfo) {
                    throw new Error('Data akun tidak ditemukan.');
                }

                renderSimpleStats(data.result, detectedRegion, uid);
            } catch (err) {
                showError('Gagal mengambil data akun. Pastikan UID sudah benar.');
                console.error(err);
            } finally {
                hideLoading();
                searchBtn.disabled = false;
            }
        });

        function renderSimpleStats(data, region, uid) {
            const acc = data.AccountInfo;
            const credit = data.creditScoreInfo;
            
            const name = acc.AccountName || 'Unknown';
            document.getElementById('playerName').textContent = name;
            document.getElementById('displayUid').textContent = `UID: ${uid}`;
            document.getElementById('playerAvatar').textContent = name.charAt(0).toUpperCase();

            // 1. Level Player & EXP
            const level = acc.AccountLevel || 0;
            document.getElementById('resLevel').textContent = level;
            document.getElementById('resExp').textContent = acc.AccountEXP ? acc.AccountEXP.toLocaleString('id-ID') : '0';

            // 2. Jumlah Like
            const likes = acc.AccountLikes || 0;
            document.getElementById('resLikes').textContent = likes.toLocaleString('id-ID');

            // 3. Level Prime (Kalkulasi Otomatis Skala 1 - 8 berdasarkan performa/level akun)
            let primeLevel = 1;
            if (level > 80 || likes > 30000) primeLevel = 8;
            else if (level > 70 || likes > 20000) primeLevel = 7;
            else if (level > 60 || likes > 12000) primeLevel = 6;
            else if (level > 50 || likes > 7000) primeLevel = 5;
            else if (level > 40 || likes > 3000) primeLevel = 4;
            else if (level > 30 || likes > 1000) primeLevel = 3;
            else if (level > 15) primeLevel = 2;
            document.getElementById('resPrime').textContent = primeLevel;

            // 4. Booyah Pas (ON/OFF)
            const isBooyahOn = acc.AccountBPBadges && acc.AccountBPBadges > 0;
            const booyahEl = document.getElementById('resBooyah');
            booyahEl.textContent = isBooyahOn ? '🟢 ON' : '🔴 OFF';

            // 5. Server Region
            const regionNames = { id: 'Indonesia 🇮🇩', sg: 'Singapore 🇸🇬', vn: 'Vietnam 🇻🇳', th: 'Thailand 🇹🇭', br: 'Brazil 🇧🇷', us: 'USA 🇺🇸', eu: 'Europe 🇪🇺', ind: 'India 🇮🇳' };
            document.getElementById('resRegion').textContent = regionNames[region] || region.toUpperCase();

            // 6. Credit Score
            document.getElementById('resCredit').textContent = credit?.creditScore || '100';

            // 7. Last Login
            if (acc.AccountLastLogin) {
                const date = new Date(acc.AccountLastLogin * 1000);
                document.getElementById('resLastLogin').textContent = date.toLocaleDateString('id-ID', {month: 'short', day: 'numeric', hour: '2-digit', minute:'2-digit'});
            } else {
                document.getElementById('resLastLogin').textContent = 'N/A';
            }

            // 8. Rumus Estimasi Harga Pasar Akun (Level, Likes, & Faktor Prime)
            let basePrice = (level * 3000) + (likes * 15) + (primeLevel * 25000);
            if (isBooyahOn) basePrice += 45000; // Bonus nilai jika BP sedang aktif
            
            // Format Rupiah
            const formattedPrice = new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(basePrice);
            document.getElementById('estimatedPrice').textContent = formattedPrice;

            showStats();
        }

        function showLoading() { loading.classList.add('active'); }
        function hideLoading() { loading.classList.remove('active'); }
        function showError(msg) { errorMessage.textContent = msg; errorMessage.classList.add('active'); }
        function hideError() { errorMessage.classList.remove('active'); }
        function showStats() { playerStats.classList.add('active'); }
        function hideStats() { playerStats.classList.remove('active'); }

        // Live Canvas Background Animation Code
        (function() {
            const canvas = document.getElementById('particles-canvas');
            const ctx = canvas.getContext('2d');
            let w, h; const particles = [];
            function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
            window.addEventListener('resize', resize); resize();
            for(let i=0; i<40; i++) {
                particles.push({
                    x: Math.random()*w, y: Math.random()*h,
                    size: 1.5 + Math.random()*2,
                    sx: (Math.random()-0.5)*0.3, sy: (Math.random()-0.5)*0.3
                });
            }
            function anim() {
                ctx.clearRect(0,0,w,h);
                particles.forEach(p => {
                    p.x += p.sx; p.y += p.sy;
                    if(p.x<0||p.x>w) p.sx*=-1; if(p.y<0||p.y>h) p.sy*=-1;
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                    ctx.fillStyle = 'rgba(56, 189, 248, 0.4)'; ctx.fill();
                });
                requestAnimationFrame(anim);
            }
            anim();
        })();
    </script>
</body>
</html>
