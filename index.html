<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Fire ID Checker Interface</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #121214;
        }
        .bg-card-dark {
            background-color: #1e1e22;
        }
        .orange-glow {
            box-shadow: 0 0 15px rgba(249, 115, 22, 0.2);
        }
    </style>
</head>
<body class="text-gray-200 font-sans min-h-screen pb-10">

    <div class="max-w-md mx-auto px-4 pt-4">
        <!-- Input Section Card -->
        <div class="bg-card-dark rounded-xl p-4 border border-gray-800 shadow-lg">
            
            <!-- Header Input -->
            <div class="flex items-center gap-2 mb-3 text-sm text-gray-400 font-medium">
                <i class="fa-solid fa-id-card text-orange-500"></i>
                <span>Masukkan Free Fire ID</span>
            </div>

            <!-- Input Box & Button -->
            <div class="flex gap-2 mb-6">
                <input 
                    type="number" 
                    id="ff-id-input" 
                    value="1263383781" 
                    class="flex-1 bg-[#151518] border border-gray-700 rounded-lg px-3 py-2.5 text-white placeholder-gray-500 focus:outline-none focus:border-orange-500 text-sm tracking-wider"
                    placeholder="Masukkan ID Akun..."
                >
                <button 
                    onclick="checkId()" 
                    class="bg-orange-500 hover:bg-orange-600 text-black font-bold px-4 py-2.5 rounded-lg text-xs flex items-center gap-1.5 transition duration-200 orange-glow uppercase"
                >
                    <i class="fa-solid fa-magnifying-glass text-[10px]"></i> Cek ID
                </button>
            </div>

            <!-- Profile Info Header -->
            <div class="flex justify-between items-start mb-6">
                <div class="flex items-center gap-3">
                    <!-- Avatar -->
                    <div class="relative w-14 h-14 rounded-xl overflow-hidden border border-gray-600 bg-zinc-800 flex items-center justify-center">
                        <i class="fa-solid fa-user-secret text-2xl text-gray-400"></i>
                    </div>
                    <!-- Nickname & ID -->
                    <div>
                        <h2 class="text-lg font-bold text-white flex items-center gap-1">
                            Naraa'★
                        </h2>
                        <p class="text-xs text-gray-500 tracking-wide" id="display-id">1263383781</p>
                    </div>
                </div>

                <!-- Guild Badge -->
                <div class="bg-[#151518] border border-gray-800 p-2 rounded-lg flex items-center gap-2 max-w-[150px]">
                    <i class="fa-solid fa-shield-halved text-yellow-500 text-lg"></i>
                    <div class="leading-tight">
                        <div class="text-[11px] font-bold text-gray-300 truncate">TGR • Kaltim</div>
                        <span class="text-[9px] text-blue-400 underline block cursor-pointer">Lihat Clan</span>
                        <div class="flex items-center justify-between text-[9px] text-gray-500 mt-1 gap-4">
                            <span>Level <span class="text-yellow-500 font-bold">4</span></span>
                            <span>10/50</span>
                        </div>
                    </div>
                </div>
            </div>

            <hr class="border-gray-800 my-4">

            <!-- Estimation & Created Date -->
            <div class="grid grid-cols-2 gap-4 mb-6 text-xs">
                <div>
                    <span class="text-gray-500 block mb-1 text-[10px] uppercase tracking-wider font-semibold">
                        <i class="fa-solid fa-wallet text-yellow-600 mr-1"></i> Estimasi Topup Kamu
                    </span>
                    <span class="text-white font-bold text-sm">Rp 34.991.000</span>
                </div>
                <div>
                    <span class="text-gray-500 block mb-1 text-[10px] uppercase tracking-wider font-semibold">
                        <i class="fa-solid fa-calendar-days text-emerald-600 mr-1"></i> Dibuat Pada
                    </span>
                    <span class="text-white font-medium block">Minggu, 4 Agustus 2019</span>
                    <span class="text-[10px] text-gray-500 block">2539 hari yang lalu</span>
                </div>
            </div>

            <!-- Signature / Bio -->
            <div class="bg-[#151518] p-3 rounded-lg border border-gray-800 mb-6">
                <span class="text-[9px] text-yellow-600 font-bold block mb-1 tracking-wider uppercase">Signature / Bio</span>
                <p class="text-xs text-gray-400 italic">Imamෆ cinta ku muachh</p>
            </div>

            <!-- Stats Grid Box -->
            <div class="grid grid-cols-4 gap-2 text-center text-xs">
                <!-- Prime Level -->
                <div class="bg-[#151518] p-2 rounded-lg border border-gray-800 flex flex-col justify-between h-16">
                    <span class="text-[9px] text-gray-500 block">Prime Level</span>
                    <span class="text-white font-bold text-sm text-yellow-500">8</span>
                </div>
                <!-- Jumlah Like -->
                <div class="bg-[#151518] p-2 rounded-lg border border-gray-800 flex flex-col justify-between h-16">
                    <span class="text-[9px] text-gray-500 block">Jumlah Like</span>
                    <span class="text-white font-bold text-sm text-yellow-500">38.704</span>
                </div>
                <!-- Booyah Pass -->
                <div class="bg-[#151518] p-2 rounded-lg border border-gray-800 flex flex-col justify-between h-16">
                    <span class="text-[9px] text-gray-500 block">Booyah Pass</span>
                    <span class="text-emerald-500 font-bold text-[11px]">Active</span>
                    <span class="text-[9px] text-gray-500">Badge: 77</span>
                </div>
                <!-- Level Player -->
                <div class="bg-[#151518] p-2 rounded-lg border border-gray-800 flex flex-col justify-between h-16">
                    <span class="text-[9px] text-gray-500 block">Level Player</span>
                    <span class="text-white font-bold text-sm">84</span>
                </div>
            </div>

        </div>
    </div>

    <!-- JavaScript Simpel untuk Fungsi Tombol Cek ID -->
    <script>
        function checkId() {
            const inputVal = document.getElementById('ff-id-input').value;
            const displayId = document.getElementById('display-id');
            
            if(inputVal.trim() === "") {
                alert("Silakan masukkan ID terlebih dahulu!");
                return;
            }
            
            // Mengubah tampilan ID sesuai input secara realtime (simulasi proses cek)
            displayId.innerText = inputVal;
            alert("Berhasil mengecek data untuk ID: " + inputVal);
        }
    </script>
</body>
</html>
