<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NXR - Cek ID Free Fire</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #0a0a0a;
    color: #0f0;
    font-family: 'Courier New', monospace;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }
  .container {
    background: #111;
    border: 2px solid #0f0;
    border-radius: 25px;
    padding: 35px;
    max-width: 800px;
    width: 100%;
    box-shadow: 0 0 60px #0f04;
  }
  h1 {
    text-align: center;
    color: #ff0044;
    text-shadow: 0 0 30px #ff0044;
    font-size: 2.2em;
    letter-spacing: 3px;
  }
  .sub {
    text-align: center;
    color: #88ff88;
    margin-bottom: 25px;
    opacity: 0.7;
  }
  .input-group {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .input-group input, .input-group select {
    flex: 1;
    padding: 15px;
    border: 2px solid #0f04;
    border-radius: 12px;
    background: #1a1a1a;
    color: #0f0;
    font-size: 16px;
    min-width: 150px;
  }
  .input-group input:focus, .input-group select:focus {
    border-color: #0f0;
    outline: none;
    box-shadow: 0 0 20px #0f04;
  }
  .btn-group {
    display: flex;
    gap: 12px;
    margin: 15px 0;
  }
  .btn-group button {
    flex: 1;
    padding: 16px;
    border: none;
    border-radius: 12px;
    font-weight: bold;
    font-size: 18px;
    cursor: pointer;
    transition: 0.3s;
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  #cekBtn {
    background: #ff0044;
    color: #fff;
    box-shadow: 0 0 30px #ff004466;
  }
  #cekBtn:hover { background: #cc0033; box-shadow: 0 0 50px #ff0044; }
  #cekBtn:disabled { opacity:0.5; cursor:not-allowed; }
  #result {
    margin-top: 20px;
    background: #0a0a0a;
    border-radius: 15px;
    padding: 20px;
    border: 1px solid #0f03;
    min-height: 200px;
    display: none;
  }
  #result.active { display: block; }
  .profile-header {
    display: flex;
    align-items: center;
    gap: 20px;
    border-bottom: 1px solid #0f03;
    padding-bottom: 15px;
    margin-bottom: 15px;
  }
  .profile-header .avatar {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    background: #222;
    border: 2px solid #0f0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
  }
  .profile-header .name {
    font-size: 24px;
    font-weight: bold;
    color: #0f0;
  }
  .profile-header .uid {
    font-size: 14px;
    color: #888;
  }
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 12px;
    margin: 15px 0;
  }
  .stat-card {
    background: #1a1a1a;
    padding: 15px;
    border-radius: 12px;
    border: 1px solid #0f03;
    text-align: center;
  }
  .stat-card .label {
    font-size: 12px;
    color: #888;
    text-transform: uppercase;
  }
  .stat-card .value {
    font-size: 22px;
    font-weight: bold;
    color: #0f0;
    margin-top: 5px;
  }
  .stat-card .value.prime { color: #ffcc00; }
  .stat-card .value.like { color: #ff66aa; }
  .loading {
    text-align: center;
    padding: 40px;
    color: #0f0;
    font-size: 18px;
    animation: blink 1s infinite;
  }
  @keyframes blink {
    0%,100% { opacity:1; }
    50% { opacity:0.3; }
  }
  .error {
    color: #ff4444;
    text-align: center;
    padding: 20px;
  }
  .warning {
    color: #ff8800;
    font-size: 12px;
    text-align: center;
    margin-top: 15px;
    border-top: 1px solid #ff880033;
    padding-top: 12px;
  }
  select option { background: #1a1a1a; color: #0f0; }
</style>
</head>
<body>
<div class="container">
  <h1>⚡ NXR-ID CHECK ⚡</h1>
  <div class="sub">— Free Fire Player Inspector —</div>

  <div class="input-group">
    <input id="uid" placeholder="Masukkan UID (contoh: 1234567890)" maxlength="15">
    <select id="region">
      <option value="id">🇮🇩 Indonesia (ID)</option>
      <option value="sg">🇸🇬 Singapore (SG)</option>
      <option value="my">🇲🇾 Malaysia (MY)</option>
      <option value="ph">🇵🇭 Philippines (PH)</option>
      <option value="th">🇹🇭 Thailand (TH)</option>
      <option value="vn">🇻🇳 Vietnam (VN)</option>
      <option value="ind">🇮🇳 India (IND)</option>
      <option value="br">🇧🇷 Brazil (BR)</option>
      <option value="bd">🇧🇩 Bangladesh (BD)</option>
      <option value="pk">🇵🇰 Pakistan (PK)</option>
      <option value="tw">🇹🇼 Taiwan (TW)</option>
      <option value="us">🇺🇸 US/NA</option>
      <option value="eu">🇪🇺 Europe (EU)</option>
      <option value="me">🇸🇦 Middle East (ME)</option>
      <option value="ru">🇷🇺 Russia (RU)</option>
      <option value="cis">🇺🇦 CIS</option>
    </select>
  </div>

  <div class="btn-group">
    <button id="cekBtn">🔍 CEK ID</button>
  </div>

  <div id="result">
    <div class="profile-header">
      <div class="avatar">🎮</div>
      <div>
        <div class="name" id="nickname">-</div>
        <div class="uid" id="uidDisplay">UID: -</div>
      </div>
    </div>
    <div class="stats-grid">
      <div class="stat-card"><div class="label">Level</div><div class="value" id="level">-</div></div>
      <div class="stat-card"><div class="label">❤️ Like</div><div class="value like" id="likes">-</div></div>
      <div class="stat-card"><div class="label">⭐ Prime</div><div class="value prime" id="prime">-</div></div>
      <div class="stat-card"><div class="label">🏆 Rank BR</div><div class="value" id="brRank">-</div></div>
      <div class="stat-card"><div class="label">⚔️ Rank CS</div><div class="value" id="csRank">-</div></div>
      <div class="stat-card"><div class="label">👥 Guild</div><div class="value" id="guild" style="font-size:16px;">-</div></div>
      <div class="stat-card"><div class="label">📅 Dibuat</div><div class="value" id="created" style="font-size:14px;">-</div></div>
      <div class="stat-card"><div class="label">🌏 Region</div><div class="value" id="regionDisplay" style="font-size:14px;">-</div></div>
    </div>
  </div>

  <div class="warning">⚠️ Data diperoleh dari API publik tidak resmi. Mungkin ada batasan request. Gunakan untuk hiburan semata.</div>
</div>

<script>
// ====== NXR-ID CHECK ENGINE ======
// Menggunakan API publik dari free-ff-api (gratis & open-source)
// Sumber: https://github.com/jinix6/free-ff-api

const uidInput = document.getElementById('uid');
const regionSelect = document.getElementById('region');
const cekBtn = document.getElementById('cekBtn');
const resultDiv = document.getElementById('result');

const nicknameEl = document.getElementById('nickname');
const uidDisplayEl = document.getElementById('uidDisplay');
const levelEl = document.getElementById('level');
const likesEl = document.getElementById('likes');
const primeEl = document.getElementById('prime');
const brRankEl = document.getElementById('brRank');
const csRankEl = document.getElementById('csRank');
const guildEl = document.getElementById('guild');
const createdEl = document.getElementById('created');
const regionDisplayEl = document.getElementById('regionDisplay');

// Mapping region ke nama
const regionNames = {
  id: 'Indonesia', sg: 'Singapore', my: 'Malaysia', ph: 'Philippines',
  th: 'Thailand', vn: 'Vietnam', ind: 'India', br: 'Brazil',
  bd: 'Bangladesh', pk: 'Pakistan', tw: 'Taiwan', us: 'USA/NA',
  eu: 'Europe', me: 'Middle East', ru: 'Russia', cis: 'CIS'
};

// API Endpoint (gratis dari jinix6/free-ff-api)
const API_BASE = 'https://free-ff-api-src-5plp.onrender.com/api/v1/account';

async function cekID() {
  const uid = uidInput.value.trim();
  const region = regionSelect.value;

  if (!uid || uid.length < 5) {
    alert('Masukkan UID yang valid (minimal 5 digit)!');
    return;
  }

  // Tampilkan loading
  cekBtn.disabled = true;
  cekBtn.textContent = '⏳ MENCARI...';
  resultDiv.classList.remove('active');
  resultDiv.innerHTML = `<div class="loading">⏳ Sedang mencari data untuk UID ${uid}...</div>`;
  resultDiv.classList.add('active');

  try {
    const url = `${API_BASE}?region=${region.toUpperCase()}&uid=${uid}`;
    const response = await fetch(url);

    if (!response.ok) {
      throw new Error(`HTTP ${response.status}`);
    }

    const data = await response.json();

    // Cek apakah ada error atau data kosong
    if (data.error || !data.basicInfo) {
      throw new Error(data.error || 'Data tidak ditemukan atau UID salah');
    }

    // Render data
    renderData(data, uid, region);

  } catch (error) {
    resultDiv.innerHTML = `<div class="error">❌ Gagal mengambil data: ${error.message}<br><br>💡 Pastikan UID benar dan region sesuai. API gratis mungkin memiliki batas request.</div>`;
    resultDiv.classList.add('active');
  } finally {
    cekBtn.disabled = false;
    cekBtn.textContent = '🔍 CEK ID';
  }
}

function renderData(data, uid, region) {
  const info = data.basicInfo || {};
  const clan = data.clanBasicInfo || {};
  const captain = data.captainBasicInfo || {};

  // Ambil data
  const nickname = info.nickname || 'Tidak diketahui';
  const level = info.level || '-';
  const likes = info.liked || info.like || '-';
  const brRank = info.rank || info.brMaxRank || '-';
  const csRank = info.csRank || info.csMaxRank || '-';
  const guildName = clan.clanName || 'Tidak ada guild';
  const createdRaw = info.createAt || info.createdAt;
  let createdDate = '-';
  if (createdRaw) {
    try {
      const ts = parseInt(createdRaw);
      if (ts > 1000000000) {
        createdDate = new Date(ts * 1000).toLocaleDateString('id-ID');
      }
    } catch(e) {}
  }

  // Prime (dari response contoh ada primeInfo.primeLevel)
  let prime = '-';
  if (data.primeInfo && data.primeInfo.primeLevel !== undefined) {
    prime = data.primeInfo.primeLevel;
  } else if (info.primeLevel !== undefined) {
    prime = info.primeLevel;
  }

  // Tampilkan
  nicknameEl.textContent = nickname;
  uidDisplayEl.textContent = `UID: ${uid}`;
  levelEl.textContent = level;
  likesEl.textContent = likes;
  primeEl.textContent = prime;
  brRankEl.textContent = brRank;
  csRankEl.textContent = csRank;
  guildEl.textContent = guildName;
  createdEl.textContent = createdDate;
  regionDisplayEl.textContent = regionNames[region] || region.toUpperCase();

  // Tampilkan result
  resultDiv.innerHTML = ''; // Kosongkan loading
  resultDiv.appendChild(document.querySelector('.profile-header').cloneNode(true));
  const grid = document.querySelector('.stats-grid').cloneNode(true);
  resultDiv.appendChild(grid);
  resultDiv.classList.add('active');

  // Update elemen yang sudah diisi
  // Karena kita clone, kita perlu update ulang
  const newResult = resultDiv;
  // Kita rebuild saja
  buildResult(data, uid, region);
}

function buildResult(data, uid, region) {
  const info = data.basicInfo || {};
  const clan = data.clanBasicInfo || {};
  const primeInfo = data.primeInfo || {};

  const nickname = info.nickname || 'Tidak diketahui';
  const level = info.level || '-';
  const likes = info.liked || info.like || '-';
  const brRank = info.rank || info.brMaxRank || '-';
  const csRank = info.csRank || info.csMaxRank || '-';
  const guildName = clan.clanName || 'Tidak ada guild';
  let prime = primeInfo.primeLevel || info.primeLevel || '-';

  let createdDate = '-';
  if (info.createAt) {
    try {
      const ts = parseInt(info.createAt);
      if (ts > 1000000000) createdDate = new Date(ts * 1000).toLocaleDateString('id-ID');
    } catch(e) {}
  }

  resultDiv.innerHTML = `
    <div class="profile-header">
      <div class="avatar">🎮</div>
      <div>
        <div class="name">${escapeHTML(nickname)}</div>
        <div class="uid">UID: ${escapeHTML(uid)}</div>
      </div>
    </div>
    <div class="stats-grid">
      <div class="stat-card"><div class="label">Level</div><div class="value">${escapeHTML(level)}</div></div>
      <div class="stat-card"><div class="label">❤️ Like</div><div class="value like">${escapeHTML(likes)}</div></div>
      <div class="stat-card"><div class="label">⭐ Prime</div><div class="value prime">${escapeHTML(prime)}</div></div>
      <div class="stat-card"><div class="label">🏆 Rank BR</div><div class="value">${escapeHTML(brRank)}</div></div>
      <div class="stat-card"><div class="label">⚔️ Rank CS</div><div class="value">${escapeHTML(csRank)}</div></div>
      <div class="stat-card"><div class="label">👥 Guild</div><div class="value" style="font-size:16px;">${escapeHTML(guildName)}</div></div>
      <div class="stat-card"><div class="label">📅 Dibuat</div><div class="value" style="font-size:14px;">${escapeHTML(createdDate)}</div></div>
      <div class="stat-card"><div class="label">🌏 Region</div><div class="value" style="font-size:14px;">${escapeHTML(regionNames[region] || region.toUpperCase())}</div></div>
    </div>
  `;
  resultDiv.classList.add('active');
}

function escapeHTML(str) {
  if (!str) return '-';
  return String(str).replace(/[&<>"]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    if (m === '"') return '&quot;';
    return m;
  });
}

// Event listener
cekBtn.addEventListener('click', cekID);

// Enter key
uidInput.addEventListener('keypress', function(e) {
  if (e.key === 'Enter') cekID();
});

// Inisialisasi
console.log('🔥 NXR-ID Check siap, Yang Mulia!');
</script>
</body>
</html>
