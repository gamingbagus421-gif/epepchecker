<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Fire ID Real-Time Checker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white flex items-center justify-center min-h-screen">

    <div class="bg-slate-800 p-8 rounded-lg shadow-xl w-full max-w-md">
        <h2 class="text-2xl font-bold mb-6 text-center text-orange-500">FF ID Checker</h2>
        
        <div class="mb-4">
            <input type="text" id="playerID" placeholder="Masukkan Player ID FF..." class="w-full p-3 bg-slate-700 rounded border border-slate-600 focus:outline-none focus:border-orange-500">
        </div>
        
        <button onclick="checkID()" class="w-full bg-orange-500 hover:bg-orange-600 font-bold py-3 rounded transition duration-200">Periksa Sekarang</button>

        <!-- Tempat Menampilkan Hasil -->
        <div id="result" class="mt-6 hidden border-t border-slate-700 pt-4">
            <p class="mb-2"><strong>Nickname:</strong> <span id="resName" class="text-orange-400"></span></p>
            <p class="mb-2"><strong>Level:</strong> <span id="resLevel"></span></p>
            <p class="mb-2"><strong>Likes:</strong> <span id="resLikes"></span></p>
            <p class="mb-2"><strong>Status Prime:</strong> <span id="resPrime"></span></p>
        </div>
    </div>

    <script>
        async function checkID() {
            const id = document.getElementById('playerID').value;
            if(!id) return alert('ID tidak boleh kosong!');

            const resultDiv = document.getElementById('result');
            resultDiv.classList.add('hidden');

            try {
                // Tembak ke backend buatan kita sendiri
                const response = await fetch(`http://localhost:3000/api/check-ff/${id}`);
                const data = await response.json();

                if(data.success) {
                    document.getElementById('resName').innerText = data.nickname;
                    document.getElementById('resLevel').innerText = data.level;
                    document.getElementById('resLikes').innerText = data.likes;
                    document.getElementById('resPrime').innerText = data.prime;
                    resultDiv.classList.remove('hidden');
                } else {
                    alert('ID Tidak Ditemukan!');
                }
            } catch (error) {
                alert('Terjadi kesalahan koneksi.');
            }
        }
    </script>
</body>
</html>
