<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>NXR - FF Check</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            background: #0a0e1a;
            color: #e0f0ff;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        #particles-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
            background: radial-gradient(ellipse at 30% 40%, #0b1a33, #030712);
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 600px;
            width: 100%;
            background: rgba(8, 20, 48, 0.8);
            backdrop-filter: blur(18px);
            border-radius: 30px;
            padding: 30px;
            border: 1px solid rgba(0, 180, 255, 0.25);
            box-shadow: 0 20px 60px rgba(0, 80, 255, 0.25);
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #38bdf8, #1d4ed8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .badge-live {
            background: #ef4444;
            color: #fff;
            font-size: 11px;
            font-weight: 700;
            padding: 4px 14px;
            border-radius: 30px;
            animation: pulse-live 1.8s infinite;
        }

        @keyframes pulse-live {
            0%,100% { opacity:1; transform:scale(1); }
            50% { opacity:0.5; transform:scale(0.95); }
        }

        .search-form {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .search-form input,
        .search-form select {
            flex: 1;
            min-width: 140px;
            padding: 14px;
            border-radius: 14px;
            border: 1px solid rgba(56, 189, 248, 0.25);
            background: rgba(15, 30, 60, 0.6);
            color: #e0f0ff;
            font-size: 15px;
            outline: none;
        }

        .search-form input:focus,
        .search-form select:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.15);
        }

        .search-form button {
            padding: 14px 30px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: #fff;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.25s;
            box-shadow: 0 8px 24px rgba(37, 99, 235, 0.3);
        }

        .search-form button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 36px rgba(37, 99, 235, 0.45);
        }

        .search-form button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 30px 0;
        }

        .loading.active { display: block; }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(56, 189, 248, 0.15);
            border-top: 4px solid #38bdf8;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .error-message {
            display: none;
            background: rgba(239, 68, 68, 0.12);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #f87171;
            padding: 14px 18px;
            border-radius: 14px;
            margin-bottom: 16px;
        }

        .error-message.active { display: block; }

        .player-stats {
            display: none;
            animation: fadeUp 0.5s ease;
        }

        .player-stats.active { display: block; }

        @keyframes fadeUp {
            0% { opacity:0; transform:translateY(15px); }
            100% { opacity:1; transform:translateY(0); }
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 18px;
            background: rgba(15, 30, 60, 0.5);
            border-radius: 20px;
            border: 1px solid rgba(56, 189, 248, 0.12);
            margin-bottom: 20px;
        }

        .avatar-circle {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1d4ed8, #38bdf8);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
        }

        .profile-info .name {
            font-size: 22px;
            font-weight: 700;
            color: #f0faff;
        }

        .profile-info .meta {
            font-size: 13px;
            color: #94a3b8;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
            margin-top: 12px;
        }

        .stat-box {
            background: rgba(15, 30, 60, 0.4);
            border: 1px solid rgba(56, 189, 248, 0.08);
            border-radius: 14px;
            padding: 14px 10px;
            text-align: center;
        }

        .stat-box .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: #f0faff;
        }

        .stat-box .stat-value.prime {
            color: #fbbf24;
            text-shadow: 0 0 20px #fbbf2444;
        }

        .stat-box .stat-value.price {
            color: #34d399;
            text-shadow: 0 0 20px #34d39944;
        }

        .stat-box .stat-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #64748b;
            margin-top: 4px;
        }

        .signature {
            margin-top: 4px;
            font-style: italic;
            color: #93c5fd;
            font-size: 14px;
            border-left: 3px solid #38bdf8;
            padding-left: 12px;
        }

        .price-note {
            font-size: 12px;
            color: #94a3b8;
            text-align: center;
            margin-top: 16px;
            border-top: 1px solid rgba(56, 189, 248, 0.1);
            padding-top: 14px;
        }

        @media (max-width: 500px) {
            .container { padding: 20px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .profile-header { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>

    <canvas id="particles-canvas"></canvas>

    <div class="container">
        <div class="header">
            <div class="logo">NXR<span style="color:#60a5fa;font-weight:300;">·FF</span></div>
            <div class="badge-live">● LIVE</div>
        </div>

        <form class="search-form" id="searchForm">
            <input type="text" id="playerUid" placeholder="UID" value="7378196943" required />
            <select id="region" required>
                <option value="id">🇮🇩 Indonesia</option>
                <option value="sg">🇸🇬 Singapura</option>
                <option value="my">🇲🇾 Malaysia</option>
                <option value="ph">🇵🇭 Filipina</option>
                <option value="th">🇹🇭 Thailand</option>
                <option value="vn">🇻🇳 Vietnam</option>
                <option value="ind">🇮🇳 India</option>
                <option value="br">🇧🇷 Brazil</option>
                <option value="pk">🇵🇰 Pakistan</option>
                <option value="tw">🇹🇼 Taiwan</option>
                <option value="us">🇺🇸 USA</option>
                <option value="eu">🇪🇺 Eropa</option>
                <option value="me">🇸🇦 Timur Tengah</option>
                <option value="ru">🇷🇺 Rusia</option>
            </select>
            <button type="submit" id="searchBtn">🔍 Cari</button>
        </form>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>⏳ Mengambil data...</p>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <div class="player-stats" id="playerStats">
            <div class="profile-header">
                <div class="avatar-circle" id="playerAvatar">?</div>
                <div class="profile-info">
                    <div class="name" id="playerName">—</div>
                    <div class="meta" id="playerMeta">Region —</div>
                    <div class="signature" id="signatureSection"></div>
                </div>
            </div>

            <div class="stats-grid" id="statsGrid"></div>

            <div class="price-note" id="priceNote">💰 Estimasi harga berdasarkan level, prime, like & credit score</div>
        </div>
    </div>

    <script>
        // ===== KONFIGURASI API =====
        const API_KEY = 'ZXwXaUMC6p8IKHEPdt5SCe8YVFPz0n';
        const USER_UID = 'zmD9KLSfNuO5Lrjij0aNQmdlRy42';
        const API_BASE = 'https://proapis.hlgamingofficial.com/main/games/freefire/account/api';

        // ===== DOM =====
        const searchForm = document.getElementById('searchForm');
        const loading = document.getElementById('loading');
        const errorMessage = document.getElementById('errorMessage');
        const playerStats = document.getElementById('playerStats');
        const searchBtn = document.getElementById('searchBtn');

        // ===== SUBMIT =====
        searchForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const uid = document.getElementById('playerUid').value.trim();
            const region = document.getElementById('region').value;

            if (!uid || !region) {
                showError('Harap isi semua field.');
                return;
            }

            hideError();
            hideStats();
            showLoading();
            searchBtn.disabled = true;

            try {
                const url =
                    `${API_BASE}?sectionName=AllData&PlayerUid=${uid}&region=${region}&useruid=${USER_UID}&api=${API_KEY}`;
                const response = await fetch(url);

                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const data = await response.json();

                if (!data.result || !data.result.AccountInfo) {
                    throw new Error('Akun tidak ditemukan');
                }

                displayStats(data.result, region, uid);
            } catch (err) {
                showError('Gagal mengambil data. Periksa UID dan region.');
                console.error(err);
            } finally {
                hideLoading();
                searchBtn.disabled = false;
            }
        });

        // ===== DISPLAY =====
        function displayStats(data, region, uid) {
            const account = data.AccountInfo || {};
            const social = data.socialinfo || {};
            const credit = data.creditScoreInfo || {};
            const primeInfo = data.primeInfo || {};

            // Ambil data
            const name = account.AccountName || 'Tidak diketahui';
            const level = account.AccountLevel || 0;
            const likes = account.AccountLikes || 0;
            const creditScore = credit.creditScore || 0;
            const primeLevel = primeInfo.primeLevel || 0;
            const signature = social.AccountSignature || '';

            // Estimasi harga (logis)
            let price = 50000; // base
            price += level * 5000; // Rp5.000 per level
            price += likes * 10; // Rp10 per like
            price += creditScore * 2000; // Rp2.000 per credit score
            price += primeLevel * 150000; // Rp150.000 per level prime

            // Kap harga wajar
            if (price > 5000000) price = 5000000;
            if (price < 50000) price = 50000;

            const priceFormatted = new Intl.NumberFormat('id-ID', {
                style: 'currency',
                currency: 'IDR',
                minimumFractionDigits: 0
            }).format(price);

            // Header
            document.getElementById('playerAvatar').textContent = name.charAt(0).toUpperCase();
            document.getElementById('playerName').textContent = name;
            document.getElementById('playerMeta').textContent = `🌏 ${region.toUpperCase()} • UID: ${uid}`;

            const sigEl = document.getElementById('signatureSection');
            if (signature) {
                sigEl.textContent = signature;
                sigEl.style.display = 'block';
            } else {
                sigEl.style.display = 'none';
            }

            // Stats Grid
            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-box">
                    <div class="stat-value prime">${primeLevel}</div>
                    <div class="stat-label">⭐ Level Prime</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value">${level}</div>
                    <div class="stat-label">📊 Level Akun</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value">${likes.toLocaleString()}</div>
                    <div class="stat-label">❤️ Like</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value">${creditScore}</div>
                    <div class="stat-label">💳 Credit Score</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value">${region.toUpperCase()}</div>
                    <div class="stat-label">🌏 Region</div>
                </div>
                <div class="stat-box" style="grid-column: span 1; background: rgba(52, 211, 153, 0.08); border-color: rgba(52, 211, 153, 0.2);">
                    <div class="stat-value price">${priceFormatted}</div>
                    <div class="stat-label">💰 Estimasi Harga</div>
                </div>
            `;

            showStats();
        }

        // ===== UTILITY =====
        function showLoading() { loading.classList.add('active'); }
        function hideLoading() { loading.classList.remove('active'); }
        function showError(msg) { errorMessage.textContent = msg;
            errorMessage.classList.add('active'); }
        function hideError() { errorMessage.classList.remove('active'); }
        function showStats() { playerStats.classList.add('active'); }
        function hideStats() { playerStats.classList.remove('active'); }

        // ===== LIVE BACKGROUND =====
        (function initParticles() {
            const canvas = document.getElementById('particles-canvas');
            const ctx = canvas.getContext('2d');
            let w, h;
            const particles = [];
            const COUNT = 70;

            function resize() {
                w = canvas.width = window.innerWidth;
                h = canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            class Particle {
                constructor() {
                    this.x = Math.random() * w;
                    this.y = Math.random() * h;
                    this.size = 1.5 + Math.random() * 3;
                    this.speedX = (Math.random() - 0.5) * 0.4;
                    this.speedY = (Math.random() - 0.5) * 0.4;
                    this.opacity = 0.2 + Math.random() * 0.5;
                }
                update() {
                    this.x += this.speedX;
                    this.y += this.speedY;
                    if (this.x < 0 || this.x > w) this.speedX *= -1;
                    if (this.y < 0 || this.y > h) this.speedY *= -1;
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(56, 189, 248, ${this.opacity * 0.6})`;
                    ctx.fill();
                }
            }

            for (let i = 0; i < COUNT; i++) particles.push(new Particle());

            function drawLines() {
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 120) {
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.strokeStyle = `rgba(56, 189, 248, ${0.06 * (1 - dist / 120)})`;
                            ctx.lineWidth = 0.6;
                            ctx.stroke();
                        }
                    }
                }
            }

            function animate() {
                ctx.clearRect(0, 0, w, h);
                particles.forEach(p => { p.update();
                    p.draw(); });
                drawLines();
                requestAnimationFrame(animate);
            }
            animate();
        })();
    </script>

</body>
</html>
