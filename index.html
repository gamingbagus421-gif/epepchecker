<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Fire ID Checker - Ice Blue Dragon</title>
    <style>
        /* --- CSS THEME: ICE BLUE DRAGON --- */
        body {
            background-color: #0b0f19;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-image: radial-gradient(circle at center, #102a45 0%, #050914 100%);
        }

        .container {
            background: linear-gradient(135deg, rgba(16, 37, 66, 0.7) 0%, rgba(7, 18, 36, 0.9) 100%);
            border: 2px solid #4facfe;
            box-shadow: 0 0 20px rgba(79, 172, 254, 0.4), inset 0 0 15px rgba(0, 242, 254, 0.2);
            border-radius: 16px;
            padding: 25px;
            width: 100%;
            max-width: 450px;
            backdrop-filter: blur(10px);
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 18px;
            font-weight: bold;
            color: #00f2fe;
            text-shadow: 0 0 8px rgba(0, 242, 254, 0.6);
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex: 1;
            background: rgba(5, 15, 30, 0.8);
            border: 1px solid #4facfe;
            border-radius: 8px;
            padding: 12px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        input[type="text"]:focus {
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.5);
            border-color: #00f2fe;
        }

        button {
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            border: none;
            border-radius: 8px;
            color: white;
            padding: 12px 20px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }

        button:hover {
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.7);
        }

        /* --- RESULT CARD PANEL --- */
        .result-card {
            display: none; /* Sembunyikan sampai data ditemukan */
            border: 1px solid rgba(79, 172, 254, 0.4);
            background: rgba(10, 25, 47, 0.6);
            border-radius: 12px;
            padding: 20px;
            margin-top: 15px;
            animation: fadeIn 0.5s ease-in-out;
        }

        .profile-section {
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid rgba(79, 172, 254, 0.3);
            padding-bottom: 15px;
            margin-bottom: 15px;
        }

        .dragon-avatar {
            width: 50px;
            height: 50px;
            border: 2px solid #00f2fe;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #071529;
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.4);
        }

        .nickname {
            font-size: 20px;
            font-weight: bold;
            color: #ffffff;
            margin: 0;
        }

        .user-id {
            font-size: 14px;
            color: #a0aec0;
            margin: 2px 0 0 0;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .info-box {
            background: rgba(5, 15, 30, 0.7);
            border: 1px solid rgba(79, 172, 254, 0.2);
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }

        .info-label {
            font-size: 11px;
            color: #00f2fe;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 16px;
            font-weight: bold;
        }

        .loading {
            text-align: center;
            color: #00f2fe;
            display: none;
            margin: 10px 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-title">
        ❄️ Masukkan Free Fire ID
    </div>
    
    <div class="input-group">
        <input type="text" id="playerID" placeholder="Contoh: 123456789" autocomplete="off">
        <button onclick="checkID()">CEK ID</button>
    </div>

    <div class="loading" id="loadingText">Mengambil data dari server Garena...</div>

    <!-- Tampilan Hasil -->
    <div class="result-card" id="resultCard">
        <div class="profile-section">
            <div class="dragon-avatar">
                🐉
            </div>
            <div>
                <p class="nickname" id="resNickname">-</p>
                <p class="user-id" id="resID">-</p>
            </div>
        </div>

        <div class="info-grid">
            <div class="info-box">
                <div class="info-label">Status Akun</div>
                <div class="info-value" style="color: #4ed9a9;">Aktif</div>
            </div>
            <div class="info-box">
                <div class="info-label">Region</div>
                <div class="info-value">Indonesia</div>
            </div>
        </div>
    </div>
</div>

<script>
    async function checkID() {
        const idInput = document.getElementById('playerID').value.trim();
        const loadingText = document.getElementById('loadingText');
        const resultCard = document.getElementById('resultCard');
        
        if (!idInput) {
            alert('Silakan masukkan ID Free Fire terlebih dahulu!');
            return;
        }

        // Tampilkan animasi loading, sembunyikan hasil sebelumnya
        loadingText.style.display = 'block';
        resultCard.style.display = 'none';

        try {
            // Menggunakan API publik terintegrasi pihak ketiga untuk mengecek ID Free Fire
            const apiUrl = `https://api.zoneid.my.id/api/game/freefire?id=${idInput}`;
            
            const response = await fetch(apiUrl);
            const data = await response.json();

            // Memeriksa keberadaan data username/nickname dari respon API
            if (data && (data.nickname || (data.result && data.result.username))) {
                const gameNickname = data.nickname || data.result.username;
                
                document.getElementById('resNickname').innerText = gameNickname;
                document.getElementById('resID').innerText = idInput;
                
                // Menampilkan panel kartu hasil
                resultCard.style.display = 'block';
            } else {
                alert('ID tidak ditemukan atau sistem sedang sibuk. Silakan coba beberapa saat lagi.');
            }
        } catch (error) {
            console.error("Kesalahan API:", error);
            alert('Gagal mengambil data dari server. Pastikan koneksi internet aktif.');
        } finally {
            // Sembunyikan tulisan loading setelah proses selesai
            loadingText.style.display = 'none';
        }
    }
</script>

</body>
</html>
